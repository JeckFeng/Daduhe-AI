version: "3.8"

services:
  # ============================================================
  # 基础设施
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    environment:
      POSTGRES_USER: daduhe
      POSTGRES_PASSWORD: daduhe_dev
      POSTGRES_DB: daduhe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daduhe"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  memgraph:
    image: memgraph/memgraph-mage:3.10.1
    container_name: memgraph
    ports:
      - "17687:7687"
      - "17444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
    healthcheck:
      test: ["CMD", "mgconsole", "--host", "localhost", "--port", "7687", "-c", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ============================================================
  # 业务服务
  # ============================================================

  doc-parser:
    build: ./services/doc-parser
    container_name: doc-parser
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: daduhe
      DB_PASSWORD: daduhe_dev
      DB_NAME: daduhe
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: "19530"
      OLLAMA_HOST: ollama
      OLLAMA_PORT: "11434"
      RULE_EXTRACTOR_WEBHOOK_URL: http://rule-extractor:3000/api/v1/rules/extract
      GRAPH_ENGINE_WEBHOOK_URL: http://graph-engine:8001/api/v1/graph/extract
      SEARCH_ENGINE_WEBHOOK_URL: http://search-engine:8002/api/v1/search/index
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  rule-extractor:
    build: ./services/rule-extractor
    container_name: rule-extractor
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: daduhe
      DB_PASSWORD: daduhe_dev
      DB_NAME: daduhe
      DOC_PARSER_URL: http://doc-parser:8080
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
    depends_on:
      postgres:
        condition: service_healthy
      doc-parser:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ============================================================
  # FXL Python 服务 (intelligence workspace)
  # ============================================================

  llm-gateway:
    build:
      context: ./services/intelligence
      dockerfile: llm-gateway/Dockerfile
    container_name: llm-gateway
    ports:
      - "8004:8004"
    environment:
      LLM_GATEWAY_DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_GATEWAY_DEEPSEEK_API_URL: https://api.deepseek.com/v1
      LLM_GATEWAY_VLLM_URL: ${VLLM_URL:-http://10.222.124.211:8000/v1}
      LLM_GATEWAY_PG_HOST: postgres
      LLM_GATEWAY_PG_PORT: "5432"
      LLM_GATEWAY_PG_USER: daduhe
      LLM_GATEWAY_PG_PASSWORD: daduhe_dev
      LLM_GATEWAY_PG_DATABASE: daduhe
      LLM_GATEWAY_CACHE_TTL_SECONDS: "604800"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  graph-engine:
    build:
      context: ./services/intelligence
      dockerfile: graph-engine/Dockerfile
    container_name: graph-engine
    ports:
      - "8001:8001"
    environment:
      GRAPH_MEMGRAPH_URI: bolt://memgraph:7687
      GRAPH_MEMGRAPH_USERNAME: ""
      GRAPH_MEMGRAPH_PASSWORD: ""
      GRAPH_MEMGRAPH_DATABASE: memgraph
      GRAPH_PG_HOST: postgres
      GRAPH_PG_PORT: "5432"
      GRAPH_PG_USER: daduhe
      GRAPH_PG_PASSWORD: daduhe_dev
      GRAPH_PG_DATABASE: daduhe
      GRAPH_LLM_GATEWAY_URL: http://llm-gateway:8004
      GRAPH_MILVUS_URI: http://milvus-standalone:19530
      GRAPH_MILVUS_USER: ""
      GRAPH_MILVUS_PASSWORD: ""
      GRAPH_MILVUS_DB: default
      GRAPH_MILVUS_ENTITY_COLLECTION: graph_entities
      GRAPH_MILVUS_RELATION_COLLECTION: graph_relationships
      GRAPH_OLLAMA_URL: http://ollama:11434
      GRAPH_EMBEDDING_MODEL: bge-m3
      GRAPH_EMBEDDING_DIM: "1024"
      GRAPH_EXTRACTION_MAX_ASYNC: "4"
      GRAPH_ENTITY_EXTRACT_MAX_GLEANING: "1"
    depends_on:
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_healthy
      milvus:
        condition: service_healthy
      llm-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  search-engine:
    build:
      context: ./services/intelligence
      dockerfile: search-engine/Dockerfile
    container_name: search-engine
    ports:
      - "8002:8002"
    environment:
      SEARCH_PG_HOST: postgres
      SEARCH_PG_PORT: "5432"
      SEARCH_PG_USER: daduhe
      SEARCH_PG_PASSWORD: daduhe_dev
      SEARCH_PG_DBNAME: daduhe
      SEARCH_MILVUS_URI: http://milvus-standalone:19530
      SEARCH_MILVUS_USER: ""
      SEARCH_MILVUS_PASSWORD: ""
      SEARCH_MILVUS_DB: default
      SEARCH_MILVUS_COLLECTION: seed_chunks
      SEARCH_OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  agent-reasoning:
    build:
      context: ./services/intelligence
      dockerfile: agent-reasoning/Dockerfile
    container_name: agent-reasoning
    ports:
      - "8003:8003"
    environment:
      AGENT_SEARCH_ENGINE_URL: http://search-engine:8002
      AGENT_LLM_GATEWAY_URL: http://llm-gateway:8004
      AGENT_GRAPH_ENGINE_URL: http://graph-engine:8001
      AGENT_DEFAULT_MODEL: vllm-local
      AGENT_SUPERVISOR_TEMPERATURE: "0.0"
      AGENT_SUPERVISOR_MAX_TOKENS: "500"
      AGENT_CONTEXT_RESOLUTION_TEMPERATURE: "0.0"
      AGENT_CONTEXT_RESOLUTION_MAX_TOKENS: "500"
      AGENT_GENERATOR_TEMPERATURE: "0.1"
      AGENT_GENERATOR_MAX_TOKENS: "2000"
      AGENT_FUSION_TOP_K: "10"
    depends_on:
      search-engine:
        condition: service_started
      graph-engine:
        condition: service_started
      llm-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  minio_data:
  memgraph_data:
  milvus_data:
  etcd_data:
  ollama_data:
